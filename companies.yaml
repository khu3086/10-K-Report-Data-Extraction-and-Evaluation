# Ten public companies across diverse sectors. Diversity is deliberate: it
# forces the extractor to handle different segment names, geographic groupings,
# and table layouts — which is where the "interesting errors" come from.
#
# `cik` is the SEC Central Index Key (no leading zeros needed here; the fetcher
# zero-pads to 10 digits). `fiscal_year` is the 10-K fiscal year we target for
# ground truth; the fetcher pulls the most recent 10-K by default.

